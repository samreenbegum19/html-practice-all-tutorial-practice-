<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>semantic tags</title>
</head>
<body>
    <!-- using header and footer tags-->
    <header>
    <h1>My Website</h1>
    <nav>
        <ul>
            <li><a href="http://www.google.com">open google</a></li>
            <li><a href="http://www.instagram.com">open instagram</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
</header>
 
<footer>
    <p>Copyright 2023</p>
</footer>

<!-- using article and section tags-->
<article>
    <h2>Article Title</h2>
    <section>
      <p>Content here</p><!-- in a website again article will be main heading inside it we have to write 
      section like paragraph content-->
    </section>
</article>

<!-- using  aside and nav-->
 <aside>
    <p>This is an aside content</p>
</aside>
<nav>
    <ul>
      <li>Home</li>
      <li>About</li>
    </ul>
</nav>

<!-- using image and figcaption-->
 <figure>
    <img src="image.png" alt="screen shot image">
    <figcaption> this image which i took screenshot of pc</figcaption>
</figure>


    
</body>
</html>
