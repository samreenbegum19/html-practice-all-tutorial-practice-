<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css media query</title>
    <style>
        body{
            background-color: rgb(204, 216, 38);
        }
        @media only screen and(max-width:150px) {
            body{
                background-color: rgb(67, 124, 9);
            }
            
        }
        .box{
            background-color: rgb(115, 115, 180);
            padding: 100px;
            margin: 23px;
            border: 3px solid red;
            display: flex;

        }
    </style>
</head>
<body>
    <div>
         css media query.
    </div>
    <div class="boxes">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>
</html>
